<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>긁어 긁어 그림</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }

        #yt-frame {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 177.78vh;
            height: 100vh;
            min-width: 100vw;
            min-height: 56.25vw;
            border: none;
            z-index: 1;
            pointer-events: none;
        }

        #cover {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 2;
            transition: opacity 0.5s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #cover-text {
            color: #383838;
            font-size: 1rem;
            font-family: sans-serif;
            letter-spacing: 0.08em;
            text-align: center;
        }

        #scratch-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
            z-index: 3;
        }

        #video {
            position: fixed;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <iframe id="yt-frame"
        src="https://www.youtube.com/embed/3F0XlKxaqbk?si=kaM3vc5yHoK8fiV_&mute=1&controls=0&autoplay=1&loop=1&playlist=zPH5KtjJFaQ"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen></iframe>

    <div id="cover">
        <div id="cover-text">화면을 긁어 우주로 떠나는 중... 🚀</div>
    </div>

    <canvas id="scratch-canvas"></canvas>
    <video id="video" autoplay muted playsinline></video>

    <script type="module">
        import {
            HandLandmarker,
            FilesetResolver,
        } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        const DRAW_TIPS = [8, 12, 16];
        const FIST_TIPS = [8, 12, 16, 20];
        const BRUSH_R = 40;

        const video = document.getElementById("video");
        const canvas = document.getElementById("scratch-canvas");
        const ctx = canvas.getContext("2d");
        const cover = document.getElementById("cover");

        const mask = document.createElement("canvas");
        const maskCtx = mask.getContext("2d");

        function resizeCanvas() {
            canvas.width = mask.width = window.innerWidth;
            canvas.height = mask.height = window.innerHeight;
            maskCtx.fillStyle = "#fff";
            maskCtx.fillRect(0, 0, mask.width, mask.height);
        }
        window.addEventListener("resize", resizeCanvas);
        resizeCanvas();

        const stream = await navigator.mediaDevices.getUserMedia({
            video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: "user" },
        });
        video.srcObject = stream;
        await new Promise(res => (video.onloadedmetadata = res));
        video.play();

        const vision = await FilesetResolver.forVisionTasks(
            "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
        );
        const handLandmarker = await HandLandmarker.createFromOptions(vision, {
            baseOptions: {
                modelAssetPath:
                    "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
                delegate: "GPU",
            },
            runningMode: "VIDEO",
            numHands: 2,
            minHandDetectionConfidence: 0.5,
            minHandPresenceConfidence: 0.5,
            minTrackingConfidence: 0.5,
        });

        function isFist(hand) {
            const palm = hand[9];
            let closed = 0;
            for (const idx of FIST_TIPS) {
                const tip = hand[idx];
                const mid = hand[idx - 2];
                const dTip = Math.hypot(tip.x - palm.x, tip.y - palm.y);
                const dMid = Math.hypot(mid.x - palm.x, mid.y - palm.y);
                if (dTip < dMid) closed++;
            }
            return closed >= 3;
        }

        function isOpen(hand) {
            const palm = hand[9];
            let open = 0;
            for (const idx of FIST_TIPS) {
                const tip = hand[idx];
                const d = Math.hypot(tip.x - palm.x, tip.y - palm.y);
                if (d > 0.12) open++;
            }
            return open >= 4;
        }

        // 손목 x 위치로 좌/우 구분 — 프레임마다 handIdx가 바뀌는 문제 해결
        function getHandKey(hand, tipIdx) {
            const wrist = hand[0];
            const side = wrist.x < 0.5 ? "R" : "L"; // canvas가 scaleX(-1)이므로 반전
            return `${side}-${tipIdx}`;
        }

        let state = "ready";
        const prevPos = {};

        function scratchLine(key, x, y) {
            if (!prevPos[key]) {
                prevPos[key] = { x, y };
                return;
            }
            maskCtx.globalCompositeOperation = "destination-out";
            maskCtx.lineWidth = BRUSH_R * 2;
            maskCtx.lineCap = "round";
            maskCtx.lineJoin = "round";
            maskCtx.strokeStyle = "rgba(0,0,0,0.4)";
            maskCtx.beginPath();
            maskCtx.moveTo(prevPos[key].x, prevPos[key].y);
            maskCtx.lineTo(x, y);
            maskCtx.stroke();
            prevPos[key] = { x, y };
        }

        let lastVideoTime = -1;

        function loop() {
            requestAnimationFrame(loop);
            if (video.readyState < 2) return;

            ctx.globalCompositeOperation = "source-over";
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            ctx.globalCompositeOperation = "destination-in";
            ctx.drawImage(mask, 0, 0);

            if (video.currentTime === lastVideoTime) return;
            lastVideoTime = video.currentTime;

            const results = handLandmarker.detectForVideo(video, performance.now());
            const hands = results.landmarks ?? [];

            if (state === "ready" && hands.some(isFist)) {
                state = "fisted";
            }

            if (state === "fisted" && hands.some(isOpen)) {
                state = "drawing";
                Object.keys(prevPos).forEach(k => delete prevPos[k]);
                cover.style.opacity = "0";
                setTimeout(() => cover.remove(), 500);
            }

            if (state === "drawing") {
                if (hands.length > 0) {
                    hands.forEach(hand => {
                        DRAW_TIPS.forEach(idx => {
                            const lm = hand[idx];
                            const key = getHandKey(hand, idx);
                            scratchLine(key, lm.x * canvas.width, lm.y * canvas.height);
                        });
                    });
                } else {
                    Object.keys(prevPos).forEach(k => delete prevPos[k]);
                }
            }
        }

        loop();
    </script>
</body>

</html>
